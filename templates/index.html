<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ShopSage AI - Your intelligent shopping companion powered by AI">
    <title>ShopSage AI — Smart Shopping Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ═══ Ambient Background ═══ -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>

    <!-- ═══ WELCOME SCREEN ═══ -->
    <div id="welcome-screen" class="welcome-screen">
        <!-- Revolving Glass Sphere -->
        <div class="sphere-container" aria-hidden="true">
            <div class="sphere-glow"></div>
            <div class="sphere">
                <div class="sphere-inner">
                    <div class="sphere-layer layer-1"></div>
                    <div class="sphere-layer layer-2"></div>
                    <div class="sphere-layer layer-3"></div>
                    <div class="sphere-highlight"></div>
                </div>
            </div>
            <div class="sphere-shadow"></div>
        </div>

        <!-- Title -->
        <p class="welcome-subtitle">AI Assistant is here to help you</p>
        <h1 class="welcome-title">What do you want to buy?</h1>

        <!-- Suggestion chips -->
        <div class="suggestion-chips" role="group" aria-label="Quick suggestions">
            <button class="chip" data-query="Show me red shirts">👕 Red Shirts</button>
            <button class="chip" data-query="Best jacket under 5000">🧥 Jackets under ₹5K</button>
            <button class="chip" data-query="What's your return policy?">📋 Return Policy</button>
            <button class="chip" data-query="Show me Nike products">👟 Nike Collection</button>
            <button class="chip chip-visual" id="visual-search-chip">📸 Search by Photo</button>
        </div>

        <!-- Welcome Input -->
        <div class="welcome-input-wrapper">
            <div class="welcome-input-glow" aria-hidden="true"></div>
            <input
                type="text"
                id="welcome-input"
                class="welcome-input"
                placeholder="Type here..."
                autocomplete="off"
                maxlength="500"
                aria-label="Search products"
            >
            <button id="welcome-send" class="welcome-send-btn" title="Search" aria-label="Send search query">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <p class="welcome-footer">Powered by <span class="powered-accent">Gemini 2.0 Flash</span> · ShopSage AI v1.0</p>
    </div>

    <!-- ═══ CHAT SCREEN ═══ -->
    <div id="chat-screen" class="chat-screen hidden">
        <!-- Chat Header -->
        <header class="chat-header">
            <button id="back-btn" class="back-btn" title="Back to home" aria-label="Return to welcome screen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="header-center">
                <div class="header-avatar" aria-hidden="true">
                    <div class="avatar-sphere-mini"></div>
                </div>
                <div class="header-info">
                    <h2>ShopSage <span class="ai-text">AI</span></h2>
                    <div class="header-status">
                        <span class="status-dot" aria-hidden="true"></span>
                        <span>Online · Ready to help</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" id="clear-chat" title="Clear chat" aria-label="Clear conversation history">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat Messages -->
        <main class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></main>

        <!-- Chat Input -->
        <footer class="chat-input-area">
            <div class="chat-input-wrapper">
                <label class="upload-btn" for="image-upload" title="Upload product image" aria-label="Upload product image">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </label>
                <input type="file" id="image-upload" accept="image/jpeg,image/png,image/webp" hidden>
                <input
                    type="text"
                    id="message-input"
                    class="message-input"
                    placeholder="Ask me anything about products..."
                    autocomplete="off"
                    maxlength="500"
                    aria-label="Type your message"
                >
                <button id="send-btn" class="send-btn" title="Send" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <!-- Image preview bar (shown when image selected) -->
            <div id="image-preview-bar" class="image-preview-bar hidden">
                <img id="image-preview-thumb" class="preview-thumb" alt="Selected image">
                <span id="image-preview-name" class="preview-name"></span>
                <button id="image-preview-clear" class="preview-clear" aria-label="Remove image">&times;</button>
            </div>
        </footer>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
