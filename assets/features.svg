<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" fill="none">
  <style>
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
    @keyframes borderGlow{0%,100%{stroke-opacity:0.4}50%{stroke-opacity:0.9}}
    @keyframes iconBounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-3px)}60%{transform:translateY(-3px)}}
    @keyframes progressFill{0%{width:0}100%{width:100%}}
    @keyframes countUp{0%{opacity:0}100%{opacity:1}}
    .card-float{animation:float 5s ease-in-out infinite}
    .border-glow{animation:borderGlow 3s ease-in-out infinite}
    .icon-bounce{animation:iconBounce 3s ease-in-out infinite}
    .pulse{animation:pulse 2.5s ease-in-out infinite}
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#12102e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/><stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/><stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/><stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/><stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/><stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/><stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/><stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>

  <rect width="1000" height="380" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#a855f7" text-anchor="middle" letter-spacing="3">CORE FEATURES</text>

  <!-- Row 1 -->
  <!-- Card 1: LLM -->
  <g class="card-float" style="animation-delay:0s" filter="url(#shadow)">
    <rect x="30" y="55" width="225" height="145" rx="14" fill="#111827" stroke="url(#purple)" stroke-width="1.2" class="border-glow"/>
    <g transform="translate(50, 75)" filter="url(#glow)" class="icon-bounce">
      <path d="M16 0L19 10.5 30 13.5 19 16.5 16 27 13 16.5 2 13.5 13 10.5z" fill="url(#purple)"/>
      <circle cx="26" cy="5" r="2.5" fill="#c084fc" opacity="0.6"/>
    </g>
    <text x="50" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">LLM Intelligence</text>
    <text x="50" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">Google Gemini 1.5 Flash for</text>
    <text x="50" y="153" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">natural conversations</text>
    <!-- Status indicator -->
    <circle cx="225" cy="75" r="4" fill="#4ade80" class="pulse"/>
    <text x="213" y="89" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#4ade80" text-anchor="middle">LIVE</text>
  </g>

  <!-- Card 2: RAG -->
  <g class="card-float" style="animation-delay:0.3s" filter="url(#shadow)">
    <rect x="275" y="55" width="225" height="145" rx="14" fill="#111827" stroke="url(#teal)" stroke-width="1.2" class="border-glow" style="animation-delay:0.3s"/>
    <g transform="translate(295, 72)" filter="url(#glow)" class="icon-bounce" style="animation-delay:0.3s">
      <rect x="0" y="3" width="22" height="25" rx="3" fill="none" stroke="url(#teal)" stroke-width="2.2"/>
      <line x1="5" y1="10" x2="17" y2="10" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
      <line x1="5" y1="15" x2="17" y2="15" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
      <line x1="5" y1="20" x2="13" y2="20" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
      <circle cx="22" cy="3" r="6" fill="url(#teal)" opacity="0.8"/>
      <path d="M19.5 3L21 4.5 24.5 1.5" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="295" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">RAG Pipeline</text>
    <text x="295" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">FAISS vector store for</text>
    <text x="295" y="153" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">grounded, accurate responses</text>
    <!-- Progress bar -->
    <rect x="295" y="170" width="180" height="4" rx="2" fill="#1e293b"/>
    <rect x="295" y="170" width="162" height="4" rx="2" fill="url(#teal)" opacity="0.7">
      <animate attributeName="width" from="0" to="162" dur="2s" fill="freeze"/>
    </rect>
    <text x="467" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#5eead4">90%</text>
  </g>

  <!-- Card 3: Router -->
  <g class="card-float" style="animation-delay:0.6s" filter="url(#shadow)">
    <rect x="520" y="55" width="225" height="145" rx="14" fill="#111827" stroke="url(#indigo)" stroke-width="1.2" class="border-glow" style="animation-delay:0.6s"/>
    <g transform="translate(540, 70)" filter="url(#glow)" class="icon-bounce" style="animation-delay:0.6s">
      <circle cx="16" cy="16" r="13" stroke="url(#indigo)" stroke-width="2.2" fill="none"/>
      <path d="M16 5l3 8-3 3-3-3z" fill="#818cf8"/>
      <path d="M16 27l-3-8 3-3 3 3z" fill="#6366f1" opacity="0.5"/>
      <circle cx="16" cy="16" r="2.5" fill="white"/>
    </g>
    <text x="540" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">Semantic Router</text>
    <text x="540" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">Embedding-based query</text>
    <text x="540" y="153" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">classification in real-time</text>
    <!-- Speed indicator -->
    <text x="710" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#818cf8" class="pulse">&lt;50ms</text>
    <text x="715" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64748b">latency</text>
  </g>

  <!-- Card 4: FastAPI -->
  <g class="card-float" style="animation-delay:0.9s" filter="url(#shadow)">
    <rect x="765" y="55" width="225" height="145" rx="14" fill="#111827" stroke="url(#pink)" stroke-width="1.2" class="border-glow" style="animation-delay:0.9s"/>
    <g transform="translate(785, 66)" filter="url(#glow)" class="icon-bounce" style="animation-delay:0.9s">
      <path d="M18 0L6 24h8L10 42 28 16h-8z" fill="url(#pink)"/>
    </g>
    <text x="785" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">FastAPI Backend</text>
    <text x="785" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">Async-first with auto</text>
    <text x="785" y="153" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">Swagger docs at /docs</text>
    <rect x="785" y="168" width="55" height="18" rx="9" fill="#f472b6" opacity="0.12"/>
    <text x="812" y="181" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#f9a8d4" text-anchor="middle">async</text>
  </g>

  <!-- Row 2 -->
  <!-- Card 5: Product Search -->
  <g class="card-float" style="animation-delay:1.2s" filter="url(#shadow)">
    <rect x="30" y="220" width="225" height="145" rx="14" fill="#111827" stroke="url(#amber)" stroke-width="1.2" class="border-glow" style="animation-delay:1.2s"/>
    <g transform="translate(50, 240)" filter="url(#glow)" class="icon-bounce" style="animation-delay:1.2s">
      <circle cx="13" cy="13" r="10" stroke="url(#amber)" stroke-width="2.5" fill="none"/>
      <line x1="21" y1="21" x2="30" y2="30" stroke="url(#amber)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="13" cy="13" r="4" fill="#fbbf24" opacity="0.2"/>
    </g>
    <text x="50" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">Smart Search</text>
    <text x="50" y="303" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">SQLite with case-insensitive</text>
    <text x="50" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">partial matching</text>
    <rect x="50" y="332" width="70" height="18" rx="9" fill="#fbbf24" opacity="0.12"/>
    <text x="85" y="345" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">indexed</text>
  </g>

  <!-- Card 6: ReAct Agent -->
  <g class="card-float" style="animation-delay:1.5s" filter="url(#shadow)">
    <rect x="275" y="220" width="225" height="145" rx="14" fill="#111827" stroke="url(#green)" stroke-width="1.2" class="border-glow" style="animation-delay:1.5s"/>
    <g transform="translate(295, 237)" filter="url(#glow)" class="icon-bounce" style="animation-delay:1.5s">
      <circle cx="15" cy="15" r="13" stroke="url(#green)" stroke-width="2" fill="none"/>
      <path d="M10 15h10M15 10v10" stroke="url(#green)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="15" cy="7" r="2" fill="#4ade80" opacity="0.6"/>
      <circle cx="22" cy="15" r="2" fill="#4ade80" opacity="0.6"/>
      <circle cx="15" cy="23" r="2" fill="#4ade80" opacity="0.6"/>
      <circle cx="8" cy="15" r="2" fill="#4ade80" opacity="0.6"/>
    </g>
    <text x="295" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">ReAct Agent</text>
    <text x="295" y="303" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">LangGraph-powered reasoning</text>
    <text x="295" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">and multi-step analysis</text>
    <rect x="295" y="332" width="90" height="18" rx="9" fill="#4ade80" opacity="0.12"/>
    <text x="340" y="345" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">autonomous</text>
  </g>

  <!-- Card 7: Policy RAG -->
  <g class="card-float" style="animation-delay:1.8s" filter="url(#shadow)">
    <rect x="520" y="220" width="225" height="145" rx="14" fill="#111827" stroke="url(#sky)" stroke-width="1.2" class="border-glow" style="animation-delay:1.8s"/>
    <g transform="translate(540, 237)" filter="url(#glow)" class="icon-bounce" style="animation-delay:1.8s">
      <rect x="2" y="0" width="18" height="22" rx="2.5" fill="none" stroke="url(#sky)" stroke-width="2.2"/>
      <path d="M7 6h8M7 10h8M7 14h5" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
      <circle cx="20" cy="22" r="7" fill="url(#sky)" opacity="0.6"/>
      <path d="M17.5 22l2 2 4-4" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="540" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">Policy RAG</text>
    <text x="540" y="303" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">FAISS semantic search for</text>
    <text x="540" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">policies and guidelines</text>
    <text x="710" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#7dd3fc" class="pulse">top-k</text>
    <text x="714" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64748b">retrieval</text>
  </g>

  <!-- Card 8: Chat UI -->
  <g class="card-float" style="animation-delay:2.1s" filter="url(#shadow)">
    <rect x="765" y="220" width="225" height="145" rx="14" fill="#111827" stroke="url(#rose)" stroke-width="1.2" class="border-glow" style="animation-delay:2.1s"/>
    <g transform="translate(785, 238)" filter="url(#glow)" class="icon-bounce" style="animation-delay:2.1s">
      <rect x="0" y="0" width="28" height="20" rx="4" fill="none" stroke="url(#rose)" stroke-width="2"/>
      <path d="M5 20l-3 8 6-5" fill="#fb7185" opacity="0.4"/>
      <line x1="6" y1="7" x2="22" y2="7" stroke="#fb7185" stroke-width="1.5" opacity="0.4"/>
      <line x1="6" y1="12" x2="18" y2="12" stroke="#fb7185" stroke-width="1.5" opacity="0.3"/>
    </g>
    <text x="785" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="white">Premium Chat UI</text>
    <text x="785" y="303" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">Dark mode, animations,</text>
    <text x="785" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#94a3b8">glassmorphism design</text>
    <rect x="785" y="332" width="80" height="18" rx="9" fill="#fb7185" opacity="0.12"/>
    <text x="825" y="345" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fda4af" text-anchor="middle">responsive</text>
  </g>
</svg>
